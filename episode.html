<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E; --red-light: #f5e6e9; --red-mid: #e8b4bc;
    --ink: #1a1a1a; --ink-mid: #4a4a4a; --ink-light: #888;
    --paper: #faf9f7; --paper-warm: #f3f0eb; --border: #e2ddd8;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250,249,247,0.93); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px;
  }
  .nav-brand { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); text-decoration: none; }
  .nav-back { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-light); text-decoration: none; }
  .nav-back:hover { color: var(--red); }

  .page-wrap { max-width: 760px; margin: 0 auto; padding: 90px 2rem 120px; }

  /* LOADING / ERROR */
  .state-msg { text-align: center; padding: 4rem 0; }
  .state-msg .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-msg p { font-size: 14px; color: var(--ink-light); }

  /* HEADER */
  .ep-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
  .ep-eyebrow::after { content: ''; display: inline-block; width: 32px; height: 1px; background: var(--red); }
  .ep-title { font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
  .ep-overview { font-size: 15px; color: var(--ink-mid); line-height: 1.8; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }

  /* SECTIONS */
  .section { margin-bottom: 2.5rem; }
  .section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

  /* KEY PEOPLE */
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
  .person-card { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 0.875rem 1rem; }
  .person-name { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
  .person-role { font-size: 12px; color: var(--ink-light); }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: grid; grid-template-columns: 72px 1fr; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-year { font-family: var(--mono); font-size: 12px; color: var(--red); padding-top: 2px; }
  .timeline-event { font-size: 14px; color: var(--ink-mid); line-height: 1.6; }

  /* LISTS */
  .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .bullet-list li { display: flex; gap: 0.75rem; font-size: 14px; color: var(--ink-mid); line-height: 1.6; }
  .bullet-list li::before { content: '—'; color: var(--red); flex-shrink: 0; margin-top: 1px; }

  /* CONCEPT PAIRS (mechanisms, big ideas, frameworks) */
  .concept-list { display: flex; flex-direction: column; gap: 1rem; }
  .concept-item { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.125rem; }
  .concept-label { font-weight: 500; font-size: 14px; margin-bottom: 4px; color: var(--ink); }
  .concept-body { font-size: 13px; color: var(--ink-mid); line-height: 1.65; }

  /* TAKEAWAYS */
  .takeaways { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.75rem; }
  .takeaway { background: var(--red-light); border-left: 3px solid var(--red); border-radius: 0 6px 6px 0; padding: 0.875rem 1rem; font-size: 14px; color: var(--ink-mid); line-height: 1.6; }

  /* QUOTE */
  .pullquote { border-left: 3px solid var(--red); padding: 1rem 1.5rem; margin: 0; background: white; border-radius: 0 6px 6px 0; }
  .pullquote p { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--ink); line-height: 1.7; margin-bottom: 0.5rem; }
  .pullquote cite { font-family: var(--mono); font-size: 11px; color: var(--ink-light); font-style: normal; }

  /* PROSE BLOCK */
  .prose { font-size: 14px; color: var(--ink-mid); line-height: 1.75; }

  /* GUEST CARD */
  .guest-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.5rem; }
  .guest-name { font-family: var(--serif); font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
  .guest-bio { font-size: 14px; color: var(--ink-mid); line-height: 1.7; }

  /* CHAT BAR */
  .chat-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(250,249,247,0.97); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .chat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red); white-space: nowrap; }
  .chat-input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.875rem; font-family: var(--sans); font-size: 14px; background: white; outline: none; }
  .chat-input:focus { border-color: var(--red-mid); }
  .chat-send { background: var(--red); color: white; border: none; border-radius: 6px; padding: 0.5rem 1.25rem; font-family: var(--mono); font-size: 12px; cursor: pointer; white-space: nowrap; }
  .chat-send:hover { opacity: 0.88; }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }

  /* CHAT DRAWER */
  .chat-drawer {
    position: fixed; bottom: 60px; left: 0; right: 0; z-index: 190;
    max-height: 52vh; overflow-y: auto;
    background: white; border-top: 1px solid var(--border);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .chat-drawer.open { transform: translateY(0); }
  .chat-drawer-inner { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem; }
  .chat-q { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--red); text-transform: uppercase; margin-bottom: 0.75rem; }
  .chat-answer { font-size: 15px; color: var(--ink); line-height: 1.75; margin-bottom: 1rem; }
  .chat-sources { display: flex; flex-direction: column; gap: 8px; }
  .chat-source { padding: 10px 14px; background: var(--paper-warm); border-left: 3px solid var(--red-mid); border-radius: 0 4px 4px 0; font-size: 13px; color: var(--ink-mid); line-height: 1.6; }
  .chat-source-num { font-family: var(--mono); font-size: 10px; color: var(--red); margin-bottom: 4px; }
  .chat-close { float: right; background: none; border: none; font-size: 18px; color: var(--ink-light); cursor: pointer; line-height: 1; }

  @media (max-width: 600px) {
    .page-wrap { padding: 80px 1.25rem 100px; }
    .people-grid, .takeaways { grid-template-columns: 1fr; }
    .chat-label { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Podcast Study Guides</a>
  <a href="/" class="nav-back">← All episodes</a>
</nav>

<div class="page-wrap" id="pageWrap">
  <div class="state-msg" id="loadingState">
    <div class="spinner"></div>
    <p>Loading study guide…</p>
  </div>
</div>

<div class="chat-drawer" id="chatDrawer">
  <div class="chat-drawer-inner">
    <button class="chat-close" onclick="closeChat()">✕</button>
    <div class="chat-q" id="chatQuestion"></div>
    <div class="chat-answer" id="chatAnswer"></div>
    <div class="chat-sources" id="chatSources"></div>
  </div>
</div>

<div class="chat-bar">
  <span class="chat-label">Ask the transcript</span>
  <input class="chat-input" id="chatInput" type="text" placeholder="Ask anything about this episode…" onkeydown="if(event.key==='Enter') sendQuestion()">
  <button class="chat-send" id="chatSend" onclick="sendQuestion()">Ask</button>
</div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : 'https://podcast-study-guides-production.up.railway.app';

const slug = new URLSearchParams(window.location.search).get('slug');

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBulletList(items) {
  return `<ul class="bullet-list">${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
}

function renderConceptList(items, labelKey, bodyKey) {
  return `<div class="concept-list">${items.map(i => `
    <div class="concept-item">
      <div class="concept-label">${esc(i[labelKey])}</div>
      <div class="concept-body">${esc(i[bodyKey])}</div>
    </div>`).join('')}</div>`;
}

function renderSection(title, html) {
  return `<div class="section"><div class="section-title">${title}</div>${html}</div>`;
}

function renderSummary(d) {
  const type = d.podcast_type;
  let sections = '';

  if (type === 'business_breakdown') {
    if (d.key_people?.length)
      sections += renderSection('Key People', `<div class="people-grid">${d.key_people.map(p => `
        <div class="person-card"><div class="person-name">${esc(p.name)}</div><div class="person-role">${esc(p.role)}</div></div>`).join('')}</div>`);
    if (d.timeline?.length)
      sections += renderSection('Timeline', `<div class="timeline">${d.timeline.map(t => `
        <div class="timeline-item"><div class="timeline-year">${esc(t.year)}</div><div class="timeline-event">${esc(t.event)}</div></div>`).join('')}</div>`);
    if (d.business_model)
      sections += renderSection('Business Model', `<p class="prose">${esc(d.business_model)}</p>`);
    if (d.competitive_moat?.length)
      sections += renderSection('Competitive Moat', renderBulletList(d.competitive_moat));

  } else if (type === 'health_science') {
    if (d.the_protocol?.length)
      sections += renderSection('The Protocol', renderBulletList(d.the_protocol));
    if (d.mechanisms?.length)
      sections += renderSection('Mechanisms', renderConceptList(d.mechanisms, 'concept', 'explanation'));
    if (d.research_cited?.length)
      sections += renderSection('Research Cited', renderConceptList(d.research_cited, 'finding', 'implication'));
    if (d.actionable_summary)
      sections += renderSection('What To Do With This', `<p class="prose">${esc(d.actionable_summary)}</p>`);

  } else if (type === 'long_form_interview') {
    if (d.guest)
      sections += renderSection('Guest', `<div class="guest-card"><div class="guest-name">${esc(d.guest.name)}</div><div class="guest-bio">${esc(d.guest.background)}</div></div>`);
    if (d.big_ideas?.length)
      sections += renderSection('Big Ideas', renderConceptList(d.big_ideas, 'idea', 'explanation'));
    if (d.key_arguments?.length)
      sections += renderSection('Key Arguments', renderBulletList(d.key_arguments));
    if (d.further_reading?.length)
      sections += renderSection('Further Reading', renderBulletList(d.further_reading));

  } else if (type === 'startup_ideas') {
    if (d.ideas_discussed?.length)
      sections += renderSection('Ideas Discussed', `<div class="concept-list">${d.ideas_discussed.map(i => `
        <div class="concept-item">
          <div class="concept-label">${esc(i.idea)}</div>
          <div class="concept-body"><strong>Market:</strong> ${esc(i.market)} &nbsp;·&nbsp; <strong>Why now:</strong> ${esc(i.why_now)}</div>
        </div>`).join('')}</div>`);
    if (d.frameworks?.length)
      sections += renderSection('Frameworks', renderConceptList(d.frameworks, 'name', 'explanation'));

  } else {
    if (d.main_topics?.length)
      sections += renderSection('Main Topics', renderConceptList(d.main_topics, 'topic', 'summary'));
  }

  // Key takeaways — common to all types
  if (d.key_takeaways?.length)
    sections += renderSection('Key Takeaways', `<div class="takeaways">${d.key_takeaways.map(t => `<div class="takeaway">${esc(t)}</div>`).join('')}</div>`);

  // Notable quote — where present
  if (d.notable_quote)
    sections += renderSection('Notable Quote', `<blockquote class="pullquote"><p>"${esc(d.notable_quote.text)}"</p><cite>— ${esc(d.notable_quote.attribution)}</cite></blockquote>`);

  const typeLabel = {
    business_breakdown: 'Business Breakdown',
    health_science: 'Health & Science',
    long_form_interview: 'Interview',
    startup_ideas: 'Startup Ideas',
    generic: 'Study Guide',
  }[type] || 'Study Guide';

  return `
    <div class="ep-eyebrow">${typeLabel}</div>
    <h1 class="ep-title">${esc(d.title)}</h1>
    <p class="ep-overview">${esc(d.overview)}</p>
    ${sections}
  `;
}

async function loadEpisode() {
  const wrap = document.getElementById('pageWrap');
  if (!slug) {
    wrap.innerHTML = '<div class="state-msg"><p>No episode specified. <a href="/">Go back</a>.</p></div>';
    return;
  }

  try {
    const res = await fetch(`${API}/summary/${slug}`);
    if (!res.ok) throw new Error('Summary not found');
    const data = await res.json();
    document.title = `${data.title} — Study Guide`;
    wrap.innerHTML = renderSummary(data);
  } catch (e) {
    wrap.innerHTML = `<div class="state-msg"><p>Could not load study guide: ${esc(e.message)}</p></div>`;
  }
}

async function sendQuestion() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q || !slug) return;

  const send = document.getElementById('chatSend');
  const drawer = document.getElementById('chatDrawer');
  const qEl = document.getElementById('chatQuestion');
  const aEl = document.getElementById('chatAnswer');
  const sEl = document.getElementById('chatSources');

  send.disabled = true;
  send.innerHTML = '<span class="chat-spinner"></span>Thinking…';
  qEl.textContent = q;
  aEl.innerHTML = '<span style="color:var(--ink-light);font-size:14px">Loading…</span>';
  sEl.innerHTML = '';
  drawer.classList.add('open');

  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episode: slug, question: q }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Server error'); }
    const data = await res.json();

    aEl.innerHTML = data.answer
      .split(/\n+/).filter(p => p.trim())
      .map(p => `<p style="margin:0 0 0.6rem">${esc(p.trim())}</p>`).join('');

    const citedIds = new Set([...data.answer.matchAll(/\[(\d+)\]/g)].map(m => parseInt(m[1])));
    sEl.innerHTML = data.sources.filter(s => citedIds.has(s.id)).map(s => {
      const sentences = s.text.match(/[^.!?]+[.!?]+/g) || [s.text];
      let preview = '';
      for (const sent of sentences) { if ((preview + sent).length > 300) break; preview += sent; }
      if (!preview) preview = sentences[0];
      return `<div class="chat-source"><div class="chat-source-num">Source ${s.id}</div><p style="margin:0">${esc(preview.trim())}</p></div>`;
    }).join('');

  } catch (e) {
    aEl.textContent = `Error: ${e.message}`;
    sEl.innerHTML = '';
  } finally {
    send.disabled = false;
    send.textContent = 'Ask';
    input.value = '';
  }
}

function closeChat() { document.getElementById('chatDrawer').classList.remove('open'); }

loadEpisode();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
